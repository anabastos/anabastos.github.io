<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Karaoke Request</title>
  <meta name="description" content="Envio de pedidos de musica para a fila do karaoke">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <main class="layout">
    <header class="hero">
      <p class="eyebrow">Karaoke Guest</p>
      <h1>Enviar musica</h1>
      <p class="subtitle">Envie seu video do YouTube e acompanhe os nomes na fila.</p>
      <div class="hero-links">
        <a class="inline-link" href="./index.html">Hub</a>
        <a class="inline-link" href="./player.html">Abrir player</a>
      </div>
    </header>

    <section class="panel panel-request">
      <div class="panel-title-row">
        <h2>Pedir musica</h2>
        <div id="roomLabel" class="room-badge">Sala: default</div>
      </div>
      <p id="authStatus" class="muted">Conectando como convidado...</p>
      <form id="requestForm" class="request-form">
        <label>
          Seu nome
          <input id="requestedBy" name="requestedBy" type="text" maxlength="40" placeholder="Ex.: Ana" required>
        </label>
        <label>
          Link do YouTube
          <input id="youtubeUrl" name="youtubeUrl" type="url" placeholder="https://www.youtube.com/watch?v=..." required>
        </label>
        <button type="submit">Adicionar na fila</button>
      </form>
      <p id="formFeedback" class="muted"></p>
    </section>

    <section class="panel panel-queue">
      <h2>Fila atual</h2>
      <ol id="queueList" class="queue-list"></ol>
    </section>
  </main>

  <script type="module" src="./request.js"></script>
</body>

</html>
